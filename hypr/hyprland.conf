################
### MONITORS ###
################
# https://wiki.hyprland.org/Configuring/Monitors/

monitor = eDP-1, 1920x1080@144, 0x0, 1
monitor = HDMI-A-1, 1920x1080@144, 0x-1080, 1

################
### PROGRAMS ###
################

$terminal = ghostty
$fileManager = nautilus
$menu = wofi --show drun

#################
### AUTOSTART ###
#################

exec-once = hiddify
exec-once = waybar & hyprpaper & mako & hypridle
exec-once = docker
exec-once = clipman serve --histpath="~/.local/share/clipman.json"
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = XCURSOR_THEME,XCursor
env = XCURSOR_SIZE,32

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 5

    border_size = 2

    col.active_border = rgba(FFFFFFFA) rgba(D5D5D5FA) 45deg
    col.inactive_border = rgba(595959aa)

    resize_on_border = true

    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 15

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 8
        passes = 3
        popups = true

        vibrancy = 0.2
    }
}

layerrule {
    name = waybar_blur
    match:namespace = waybar
    blur = on
    blur_popups = on
    ignore_alpha = 0
}

layerrule {
    name = mako_blur
    match:namespace = notifications
    blur = on
    ignore_alpha = 0
}

animations {
    enabled = yes

    bezier = quart, 0.25, 1, 0.5, 1

    animation = windows, 1, 6, quart, slide
    animation = border, 1, 6, quart
    animation = borderangle, 1, 6, quart
    animation = fade, 1, 6, quart
    animation = workspaces, 1, 6, quart
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}

#############
### INPUT ###
#############

input {
    kb_layout = us,ru
    kb_variant =
    kb_model =
    kb_options = grp:alt_shift_toggle
    kb_rules =

    follow_mouse = 0

    sensitivity = -0.2

}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

bind = , F9, exec, brightnessctl set 10%-
bind = , F10, exec, brightnessctl set +10%

bind = , F2, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%-
bind = , F3, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%+

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, space, exec, $menu
bind = $mainMod, T, exec, Telegram
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, Z, exec, zen-browser

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Area screenshot into clipboard
bind = $mainMod, P, exec, grim -g "$(slurp)" - | wl-copy

# Clipboard
#bind = $mainMod, V, exec, clipman pick -t rofi

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Move windows with mainMod + arrow keys
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

bind = $mainMod, G, togglegroup
bind = $mainMod, tab, changegroupactive, f

bind = $mainMod, F, fullscreen, 0
bind = $mainMod, V, togglefloating

bind = $mainMod, N, togglespecialworkspace, notes
bind = $mainMod SHIFT, N, movetoworkspace, special:notes

#bind = SUPER, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

##############################
### WINDOWS AND WORKSPACES ###
##############################

# For main JetBrains windows. Keep focus on parent window.
windowrule = no_focus on, match:class ^(jetbrains-goland)$, match:title ^win\d+$
windowrule = no_initial_focus on, match:class ^(jetbrains-goland)$, match:title ^win\d+$
windowrule = no_focus on, match:class ^(jetbrains-datagrip)$, match:title ^win\d+$
windowrule = no_initial_focus on, match:class ^(jetbrains-datagrip)$, match:title ^win\d+$

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppress_event maximize, match:class .*

# Fix some dragging issues with XWayland
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

workspace = w[t1], gapsin:0, border:0

workspace = 1, monitor:eDP-1
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1
workspace = 5, monitor:eDP-1
workspace = 6, monitor:HDMI-A-1
workspace = 7, monitor:HDMI-A-1
workspace = 8, monitor:HDMI-A-1
workspace = 9, monitor:HDMI-A-1
workspace = 10, monitor:HDMI-A-1
